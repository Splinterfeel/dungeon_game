<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Arena Debug Map</title>

<style>
* {
    box-sizing: border-box;
}

body {
    font-family: monospace;
    background: #111;
    color: #eee;
}

#map {
    display: grid;
    gap: 2px;
    margin-top: 20px;
    width: fit-content;
}

.cell {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
}

/* base */
.wall { background: #222; }
.floor { background: #444; }

/* entities */
.player { background: #7ea97f; }
.player_current { background: #2c902f; font-weight: bold;}
.enemy { background: #f44336; }
.chest { background: gold; color: black; }

/* debug */
.move { outline: 2px solid #00ffff; }

/* actor bars */
.actor-row { margin-bottom: 6px; font-size: 13px; }
.actor-name { margin-bottom: 2px; }
.bar-container {
    width: 160px; height: 14px;
    background: #333; border: 1px solid #555;
    display: inline-flex; align-items: center;
    position: relative; vertical-align: middle;
}
.bar-fill { height: 100%; transition: width 0.3s; }
.bar-fill.hp { background: #4caf50; }
.bar-fill.ap { background: #2196f3; }
.bar-text {
    position: absolute; width: 100%; text-align: center;
    font-size: 11px; color: #eee; text-shadow: 0 0 2px #000;
}
.bar-label { display: inline-block; width: 24px; font-size: 11px; color: #aaa; }
.available { background: rgba(0, 255, 255, 0.35) !important; }
.selected { outline: 3px solid #ff00ff; }
.overwatch { outline: 3px solid #ff6600; box-shadow: 0 0 8px #ff6600; }
.fog { filter: brightness(0.25) saturate(0.1); }

/* layout */
#layout {
    display: flex;
    gap: 20px;
    align-items: flex-start;
}
#left_panel { flex: 0 0 60%; min-width: 0; }
#right_panel {
    flex: 1;
    position: sticky;
    top: 20px;
    display: flex;
    flex-direction: column;
}

/* event log */
#event_log {
    width: 100%;
    height: calc(55vh - 60px);
    overflow-y: auto;
    border: 1px solid #555;
    background: #1a1a1a;
    padding: 8px;
    font-size: 13px;
    line-height: 1.5;
}
#event_log .event-line {
    border-bottom: 1px solid #333;
    padding: 3px 0;
}
#event_log .event-time {
    color: #888;
    margin-right: 6px;
}

/* mech inspector (right panel) */
#mech_inspector_panel {
    margin-top: 16px;
    border: 1px solid #555;
    background: #1a1a1a;
    padding: 8px;
}

/* control groups (left panel) */
.panel-group {
    border: 1px solid #555;
    background: #1a1a1a;
    margin-bottom: 12px;
    padding: 10px;
}
.panel-group legend {
    color: #aaa;
    padding: 0 6px;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}
.control-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 8px;
}
.control-row:last-child {
    margin-bottom: 0;
}

</style>
</head>

<body>

<div id="layout">
<div id="left_panel">

<fieldset class="panel-group">
<legend>Лобби</legend>
<div class="control-row">
    <label for="input_players_num">Кол-во игроков</label>
    <input type="number" id="input_players_num" value="1" style="width: 50px">
    <button onclick="create_lobby()" style="background: #4caf50; color: white;">Создать лобби (POST)</button>
</div>
<div class="control-row">
    <select id="team_select" style="background: #222; color: #eee; padding: 5px;">
        <option value="1">1</option>
        <option value="2">2</option>
    </select>
    <label for="mech_preset_select">Пресет меха</label>
    <select id="mech_preset_select" style="background: #222; color: #eee; padding: 5px;">
        <option value="">-- случайный --</option>
    </select>
    <button onclick="connect_to_lobby()" style="background: #4caf50; color: white;">Присоединиться к лобби (POST)</button>
</div>
<div class="control-row">
    <button onclick="start_game()" style="background: #4caf50; color: white;">Старт игры (POST)</button>
</div>
</fieldset>

<fieldset class="panel-group">
<legend>Игрок и WS-соединение</legend>
<div class="control-row">
    <label for="player_id_input">Player ID</label>
    <input type="text" value="45f613c8-df18-48ae-8b85-852a0beb9ca9" id="player_id_input" style="width: 40%;"/>
    <button onclick="generate_new_player_id()">Сгенерить новый</button>
</div>
<div class="control-row">
    <label for="lobby_id_select">Lobby ID</label>
    <select id="lobby_id_select" style="width: 40%; background: #222; color: #eee; padding: 5px;">
        <option value="">-- Выберите лобби --</option>
    </select>
    <button onclick="refresh_lobbies_list()">Обновить список</button>
    <input type="hidden" value="" id="lobby_id_input"/>
</div>
<div class="control-row">
    <button onclick="connect_ws()" style="background: #94941b; color: white; font-weight: bold;">Connect WS</button>
</div>
</fieldset>

<fieldset class="panel-group">
<legend>Действия в бою</legend>
<div class="control-row">
    <button onclick="send_end_turn()" style="background: #a66606; color: white; font-weight: bold;">END TURN</button>
    <button onclick="send_move()" style="background: #057514; color: white; font-weight: bold;">MOVE</button>
    <button onclick="send_overwatch()" style="background: #8b0000; color: white; font-weight: bold;">OVERWATCH</button>
    <button onclick="send_open_chest()" style="background: #b8860b; color: white; font-weight: bold;">OPEN CHEST</button>
</div>
<div class="control-row">
    <label for="weapon_select">Оружие:</label>
    <select id="weapon_select" style="background: #222; color: #eee; padding: 5px;"></select>
    <button onclick="send_attack()" style="background: #057514; color: white; font-weight: bold;">ATTACK</button>
</div>
</fieldset>

<div id="actors" style="margin-top: 20px;"></div>

<div id="map"></div>
<div id="cell_info" style="margin-top: 10px; min-height: 24px; color: #ccc;"></div>

</div>
<div id="right_panel">

<div style="color: #aaa; margin-bottom: 8px;">Лог событий</div>
<div id="event_log"></div>

<div id="mech_inspector_panel">
    <div style="color: #aaa; margin-bottom: 8px;">Инспектор меха (ЛКМ по клетке на карте)</div>
    <div id="mech_inspector"></div>
</div>

</div>
</div>

<script src="/static/utils.js"></script>


<script>
let selectedCell = null;
let lastPlayerState = null;
let availableMoves = [];
let lastGameState = null;

function select_cell(x, y, cellEl) {
    document.querySelectorAll(".cell.selected").forEach(c => c.classList.remove("selected"));
    cellEl.classList.add("selected");
    selectedCell = { x, y };
    render_mech_inspector();

    const info = document.getElementById("cell_info");
    if (!lastGameState) { info.textContent = ""; return; }

    const players = lastGameState.players || [];
    const enemies = lastGameState.arena.enemies || [];
    const chests = lastGameState.arena.chests || [];
    let _pre_content = `[${x} ${y}]`;
    const player = players.find(p => p.position.x === x && p.position.y === y);
    if (player) { info.textContent = `${_pre_content} Игрок: ${player.name} HP ${player.stats.health} Speed ${player.stats.speed}`; return; }

    const enemy = enemies.find(e => e.position.x === x && e.position.y === y);
    if (enemy) { info.textContent = `${_pre_content} Враг: ${enemy.name} HP ${enemy.stats.health} Speed ${enemy.stats.speed}`; return; }

    const chest = chests.find(c => c.position.x === x && c.position.y === y);
    if (chest) { info.textContent = `${_pre_content} Сундук`; return; }

    const tiles = lastGameState.arena.map.tiles;
    info.textContent = tiles[x][y] === " # " ? `${_pre_content} Стена` : `${_pre_content} Пол`;
}

let socket;
const _input = document.getElementById("player_id_input");
_input.value = generateUUID();

// Event listener for lobby select dropdown
document.getElementById("lobby_id_select").addEventListener("change", function() {
    document.getElementById("lobby_id_input").value = this.value;
});

// Initialize lobbies list on page load
refresh_lobbies_list();
refresh_mech_presets();

function generate_new_player_id(){
    const _input = document.getElementById("player_id_input");
    _input.value = generateUUID();
}

function generate_new_lobby_id(){
    const newId = generateUUID();
    const hiddenInput = document.getElementById("lobby_id_input");
    const select = document.getElementById("lobby_id_select");

    hiddenInput.value = newId;

    // Create a new option for this manually generated ID
    const option = document.createElement("option");
    option.value = newId;
    option.textContent = `${newId} (Новый ID)`;
    option.selected = true;

    select.appendChild(option);
}

async function refresh_lobbies_list() {
    try {
        const response = await fetch(`http://{{ host }}/lobbies`);
        const lobbies = await response.json();

        const select = document.getElementById("lobby_id_select");
        const hiddenInput = document.getElementById("lobby_id_input");

        // Save current selection
        const currentValue = hiddenInput.value;

        // Clear existing options (except the default one)
        select.innerHTML = '<option value="">-- Выберите лобби --</option>';

        // Populate select with lobbies
        for (const lobby of lobbies) {
            const option = document.createElement("option");
            option.value = lobby.id;
            const status = lobby.game_started ? "[Игра идет]" : "[Ожидание]";
            const playersInfo = `${lobby.team_1_connected_players}/${lobby.players_num} игроков`;
            option.textContent = `${lobby.name} (${playersInfo}) ${status}`;

            if (lobby.id === currentValue) {
                option.selected = true;
            }

            select.appendChild(option);
        }

        // Update hidden input with current selection
        if (currentValue && lobbies.some(l => l.id === currentValue)) {
            hiddenInput.value = currentValue;
        }

    } catch (e) {
        console.error("Ошибка при получении списка лобби:", e);
        alert("Не удалось получить список лобби");
    }
}

async function create_lobby() {
    const _player_id_input = document.getElementById("player_id_input");
    const _input_lobby = document.getElementById("lobby_id_input");
    const _players_num = document.getElementById("input_players_num");
    try {
        const response = await fetch("http://{{ host }}/lobbies", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                players_num: _players_num.value,
                created_by_player_id: _player_id_input.value
            })
        });
        const data = await response.json();
        _input_lobby.value = data.lobby_id;
        showToast("Лобби успешно создано");

        // Refresh lobbies list and select the newly created lobby
        await refresh_lobbies_list();

        return data.lobby_id;
    } catch (e) {
        console.error("Ошибка при создании лобби:", e);
        alert("Не удалось создать лобби");
    }
}

async function start_game() {
    const _input_lobby = document.getElementById("lobby_id_input");
    try {
        const response = await fetch("http://{{ host }}/start_game", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                lobby_id: _input_lobby.value,
            })
        });
        const response_data = await response.json();
        showToast(JSON.stringify(response_data["detail"]));

        // Refresh lobbies list to update game state
        await refresh_lobbies_list();

    } catch (e) {
        console.error("Ошибка при старте игры", e);
        alert("Не удалось стартовать игру");
    }
}

// name -> description, для показа лора пресета в mech-инспекторе (по клику на актора)
let mechPresetDescriptions = {};

async function refresh_mech_presets() {
    const _select = document.getElementById("mech_preset_select");
    try {
        const response = await fetch("http://{{ host }}/mech_presets");
        const presets = await response.json();
        // сохраняем опцию "случайный", дальше добавляем пресеты
        _select.innerHTML = '<option value="">-- случайный --</option>';
        presets.forEach(preset => {
            const option = document.createElement("option");
            option.value = preset.name;
            option.textContent = preset.name;
            _select.appendChild(option);
            mechPresetDescriptions[preset.name] = preset.description;
        });
    } catch (e) {
        console.error("Ошибка при получении списка пресетов меха:", e);
    }
}

async function connect_to_lobby() {
    const _input_lobby = document.getElementById("lobby_id_input");
    const _player_id_input = document.getElementById("player_id_input");
    const _player_team_select = document.getElementById("team_select");
    const _mech_preset_select = document.getElementById("mech_preset_select");
    try {
        const response = await fetch("http://{{ host }}/connect_lobby", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                lobby_id: _input_lobby.value,
                player: {
                    id: _player_id_input.value,
                    team: _player_team_select.value,
                    mech_preset: _mech_preset_select.value || null,
                }
            })
        });
        const response_data = await response.json();
        showToast(JSON.stringify(response_data));

        // Refresh lobbies list to update player counts
        await refresh_lobbies_list();

    } catch (e) {
        console.error("Ошибка при присоединении к лобби:", e);
        alert("Не удалось присоединиться к лобби");
    }
}

async function connect_ws() {
    const _input_player_id = document.getElementById("player_id_input");
    const _input_lobby_id = document.getElementById("lobby_id_input");
    const playerId = _input_player_id.value;
    let lobbyId = _input_lobby_id.value;
    if (lobbyId === ""){
        await create_lobby();
        lobbyId = _input_lobby_id.value; // Get the newly created lobby ID
    }
    else {
        console.log("connect(): using lobby uuid from input");
    }

    // Refresh lobbies list to show current state before connecting
    await refresh_lobbies_list();

    socket = new WebSocket(`ws://{{ host }}/ws/${lobbyId}/${playerId}`);
    socket.onclose = (event) => {
        console.log(`Код: ${event.code}`);
        console.log(`Причина: ${event.reason}`); // "Lobby not found"

        if (event.reason === "Lobby not found") {
            alert("Лобби не существует!");
        }
    };

    socket.onmessage = (event) => {
        console.log("msg WS");
        const msg = JSON.parse(event.data);
            handle_ws_msg(msg);
    };
}

function append_event_log(text) {
    const log = document.getElementById("event_log");
    const line = document.createElement("div");
    line.classList.add("event-line");
    const now = new Date();
    const time = now.toLocaleTimeString("ru-RU", {hour: "2-digit", minute: "2-digit", second: "2-digit"});
    line.innerHTML = `<span class="event-time">[${time}]</span>${text}`;
    log.appendChild(line);
    log.scrollTop = log.scrollHeight;
}

function handle_ws_msg(msg) {
    console.log(msg);
    if (msg.type === "lobby_state") {
        console.log("lobby msg state");
    }
    else if (msg.type === "game_event") {
        showToast(msg.message);
        append_event_log(msg.message);
    }
    else if (msg.type === "state_update") {
        handle_game_state(msg.payload);
    }
}

function update_weapon_selector(weapons) {
    const select = document.getElementById("weapon_select");
    const currentSelectedId = select.value;
    select.innerHTML = "";
    weapons.forEach(w => {
        const option = document.createElement("option");
        option.value = w.id;
        option.textContent = `${w.name} (Dmg: ${w.damage}, Rng: ${w.range})`;
        if (w.id === currentSelectedId) {
            option.selected = true;
        }
        select.appendChild(option);
    });
}

const MECH_PART_LABELS = {torso: "Корпус", legs: "Ноги", arms: "Руки", head: "Голова"};
const MECH_STAT_LABELS = {health: "HP", speed: "Speed", accuracy: "Accuracy", melee_power: "Melee power", view_distance: "View distance"};
const PART_RARITY_LABELS = {common: "common", rare: "rare", epic: "epic"};

function find_selected_actor() {
    if (!lastGameState || !selectedCell) return null;
    const { x, y } = selectedCell;
    const player = lastGameState.players.find(p => p.position.x === x && p.position.y === y);
    if (player) return { kind: "player", actor: player };
    const enemy = (lastGameState.arena.enemies || []).find(e => e.position.x === x && e.position.y === y);
    if (enemy) return { kind: "enemy", actor: enemy };
    return null;
}

function render_mech_inspector() {
    const container = document.getElementById("mech_inspector");
    const found = find_selected_actor();
    if (!found) {
        container.innerHTML = `<div style="color:#888;font-size:12px;">Кликните ЛКМ по игроку (любой команды) или врагу на карте.</div>`;
        return;
    }
    const { kind, actor } = found;

    const statsRows = [
        ["HP", `${actor.stats.health}/${actor.stats.max_health}`],
        ["AP", `${actor.current_action_points}/${actor.stats.action_points}`],
        ["Speed", actor.stats.speed],
        ["Accuracy", actor.stats.accuracy],
        ["Melee power", actor.stats.melee_power],
        ["View distance", actor.stats.view_distance],
    ];
    const title = kind === "player" ? `Игрок ${actor.name} (команда ${actor.team})` : `Враг (ИИ) ${actor.name}`;
    let html = `<div style="font-weight:bold;">${title} — итоговые характеристики</div>`;

    const presetName = kind === "player" ? actor.mech.preset_name : null;
    const presetDescription = presetName ? mechPresetDescriptions[presetName] : null;
    if (presetDescription) {
        html += `<div style="font-size:12px;margin:4px 0 8px;padding:6px 8px;` +
            `background:#1a1a1a;border-left:2px solid #8fd88f;color:#bbb;font-style:italic;">` +
            `<span style="font-style:normal;color:#8fd88f;">${presetName}.</span> ${presetDescription}` +
            `</div>`;
    }

    html += `<table style="border-collapse:collapse;font-size:12px;margin:4px 0 10px;">`;
    for (const [label, value] of statsRows) {
        html += `<tr><td style="padding:1px 8px 1px 0;color:#aaa;">${label}</td><td>${value}</td></tr>`;
    }
    html += `</table>`;

    if (kind === "player") {
        html += `<div style="font-weight:bold;">Детали меха</div>`;
        for (const slot of ["torso", "legs", "arms", "head"]) {
            const part = actor.mech[slot];
            const nonZeroStats = Object.keys(MECH_STAT_LABELS)
                .filter(key => part[key] !== 0)
                .map(key => `${MECH_STAT_LABELS[key]}: ${part[key]}`)
                .join(", ");
            const rarityLabel = PART_RARITY_LABELS[part.rarity] || part.rarity;
            html += `<div style="font-size:12px;margin-top:2px;">` +
                `<span style="color:#8fd88f;">${MECH_PART_LABELS[slot]}</span> — ${part.name} ` +
                `<span style="color:#888;">[${rarityLabel}]</span>` +
                (nonZeroStats ? ` (${nonZeroStats})` : " (нет бонусов)") +
                `</div>`;
        }
    } else {
        html += `<div style="font-size:12px;color:#888;">У врага пока нет меха — плоские характеристики (см. AGENTS.md).</div>`;
    }

    html += `<div style="font-weight:bold;margin-top:10px;">Трофеи (${actor.trophies.length})</div>`;
    if (actor.trophies.length) {
        html += `<ul style="font-size:12px;margin:4px 0 0;padding-left:18px;">`;
        for (const loot of actor.trophies) {
            html += `<li>${loot}</li>`;
        }
        html += `</ul>`;
    } else {
        html += `<div style="font-size:12px;color:#888;">Пусто</div>`;
    }
    container.innerHTML = html;
}

function handle_game_state(state){
    lastGameState = state;
    const playerId = document.getElementById("player_id_input").value;
    lastPlayerState = state.players.find(p => p.id === playerId);

    if (lastPlayerState) {
        document.title = lastPlayerState.name;
        update_weapon_selector(lastPlayerState.inventory.weapons);
    }
    const arena = state.arena;
    const tiles = arena.map.tiles;
    const width = arena.map.width;
    const height = arena.map.height;
    const currentActor = state.turn.current_actor;
    if (currentActor && currentActor.id === playerId){
        showToast("Ваш ход!");
    }

    availableMoves = state.turn.available_moves || [];

    const actorsContainer = document.getElementById("actors");
    actorsContainer.innerHTML = "";

    function makeBar(label, current, max, barClass) {
        const pct = max > 0 ? Math.round(current / max * 100) : 0;
        return `<span class="bar-label">${label}</span>` +
            `<span class="bar-container">` +
            `<span class="bar-fill ${barClass}" style="width:${pct}%"></span>` +
            `<span class="bar-text">${current}/${max}</span>` +
            `</span> `;
    }

    function makeActorRow(name, stats, currentAp, color, isOverwatch) {
        const div = document.createElement("div");
        div.classList.add("actor-row");
        div.style.color = color;
        const owTag = isOverwatch ? ' <span style="color:#ff6600;">[OVERWATCH]</span>' : '';
        div.innerHTML = `<div class="actor-name">${name}${owTag} Melee: ${stats.melee_power}</div>` +
            makeBar("HP", stats.health, stats.max_health, "hp") +
            makeBar("AP", currentAp, stats.action_points, "ap");
        return div;
    }

    for (const e of arena.enemies) {
        actorsContainer.appendChild(makeActorRow(`ИИ/Враг ${e.name}`, e.stats, e.current_action_points, "#AA3344", !!e.overwatch));
    }
    for (const p of state.players) {
        actorsContainer.appendChild(makeActorRow(`Игрок ${p.name}`, p.stats, p.current_action_points, "#338833", !!p.overwatch));
    }
    if (state.turn.current_actor) {
        const ca = state.turn.current_actor;
        actorsContainer.appendChild(makeActorRow(`Текущий ${ca.name}`, ca.stats, ca.current_action_points, "#99AAEE", !!ca.overwatch));
    }

    render_mech_inspector();

    const container = document.getElementById("map");
    container.innerHTML = "";
    container.style.gridTemplateColumns = `repeat(${width}, 32px)`;

    // === создаём базовую карту (логика остается прежней) ===
    let visual = [];
    for (let x = 0; x < width; x++) {
        visual[x] = [];
        for (let y = 0; y < height; y++) {
            visual[x][y] = { base: normalize_map_value(tiles[x][y]), entity: null };
        }
    }

    // === накладываем сущности ===


    // враги
    for (const e of arena.enemies) {
        visual[e.position.x][e.position.y].entity = "E";
        visual[e.position.x][e.position.y].overwatch = !!e.overwatch;
    }
    for (const c of arena.chests) {
        visual[c.position.x][c.position.y].entity = "C";
    }

    // игроки
    for (const p of state.players) {
        let _val = "P";
        if (p.id == lastPlayerState.id){
            _val = "P!";
        }
        visual[p.position.x][p.position.y].entity = _val;
        visual[p.position.x][p.position.y].overwatch = !!p.overwatch;
    }
    // === туман войны (евклидова дистанция + луч видимости по Брезенхему) ===
    const viewDist = lastPlayerState.stats.view_distance;
    const px = lastPlayerState.position.x;
    const py = lastPlayerState.position.y;

    function bresenham(x1, y1, x2, y2) {
        const points = [];
        let dx = Math.abs(x2 - x1);
        let dy = Math.abs(y2 - y1);
        let x = x1, y = y1;
        const sx = x1 > x2 ? -1 : 1;
        const sy = y1 > y2 ? -1 : 1;
        if (dx > dy) {
            let err = dx / 2.0;
            while (x !== x2) {
                points.push({x, y});
                err -= dy;
                if (err < 0) { y += sy; err += dx; }
                x += sx;
            }
        } else {
            let err = dy / 2.0;
            while (y !== y2) {
                points.push({x, y});
                err -= dx;
                if (err < 0) { x += sx; err += dy; }
                y += sy;
            }
        }
        points.push({x, y});
        return points;
    }

    function isWall(x, y) {
        if (x < 0 || x >= width || y < 0 || y >= height) return true;
        return normalize_map_value(tiles[x][y]) === "#";
    }

    function hasLineOfSight(x1, y1, x2, y2) {
        const line = bresenham(x1, y1, x2, y2);
        for (let i = 1; i < line.length - 1; i++) {
            if (isWall(line[i].x, line[i].y)) return false;
        }
        return true;
    }

    const fogMap = [];
    for (let x = 0; x < width; x++) {
        fogMap[x] = [];
        for (let y = 0; y < height; y++) {
            const inRange = Math.sqrt((x - px) ** 2 + (y - py) ** 2) <= viewDist;
            fogMap[x][y] = !inRange || !hasLineOfSight(px, py, x, y);
        }
    }

    for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
            const cellData = visual[x][y];
            const cell = document.createElement("div");
            cell.classList.add("cell");

            // base
            cell.classList.add(cellData.base === "#" ? "wall" : "floor");

            // fog of war
            if (fogMap[x][y]) {
                cell.classList.add("fog");
            }

            // entity overlay
            if (cellData.entity) {
                const entityMap = {"P!" :"player_current", "P": "player", "E": "enemy", "C": "chest" };
                const className = entityMap[cellData.entity];
                if (className) {
                    cell.classList.add(className);
                    cell.innerText = cellData.entity;
                }
                if (cellData.overwatch) {
                    cell.classList.add("overwatch");
                }
            }

            cell.addEventListener("click", () => select_cell(x, y, cell));
            if (availableMoves.some(m => m.x === x && m.y === y)) {
                cell.classList.add("available");
            }
            if (selectedCell && selectedCell.x === x && selectedCell.y === y) {
                cell.classList.add("selected");
            }
            container.appendChild(cell);
        }
    }
}

async function send_end_turn() {
    if (!socket || socket.readyState !== WebSocket.OPEN) {
        alert("WebSocket не подключен!");
        return;
    }
    if (!lastPlayerState) {
        alert("Данные игрока еще не получены от сервера (state_update) или игрок мёртв");
        return;
    }
    const action = {
        id: generateUUID(), // uuid.UUID
        actor_id: lastPlayerState.id,  // ActorState (объект из последнего state_update)
        type: "END_TURN",        // Literal
        cell: {                  // PointState
            x: lastPlayerState.position.x,
            y: lastPlayerState.position.y
        },
        params: null             // dict | None
    };
    console.log("Sending END_TURN action:", action);
    socket.send(JSON.stringify(action));
}
