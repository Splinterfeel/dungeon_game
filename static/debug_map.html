<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dungeon Debug Map</title>

<style>
* {
    box-sizing: border-box;
}

body {
    font-family: monospace;
    background: #111;
    color: #eee;
}

#map {
    display: grid;
    gap: 2px;
    margin-top: 20px;
    width: fit-content;
}

.cell {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
}

/* base */
.wall { background: #222; }
.floor { background: #444; }

/* entities */
.player { background: #4caf50; }
.enemy { background: #f44336; }
.chest { background: gold; color: black; }
.exit { background: #2196f3; }

/* debug */
.move { outline: 2px solid #00ffff; }
.available { background: rgba(0, 255, 255, 0.35) !important; }
.selected { outline: 3px solid #ff00ff; }

</style>
</head>

<body>

<br>
<label for="input_players_num">Кол-во игроков</label>
<input type="number" id="input_players_num" value="1" style="width: 50px">
<button onclick="create_lobby()" style="background: #4caf50; color: white;">Создать лобби (POST)</button>
<button onclick="connect_to_lobby()" style="background: #4caf50; color: white;">Присоединиться к лобби (POST)</button>
<button onclick="start_game()" style="background: #4caf50; color: white;">Старт игры (POST)</button>
<br>
<br>
<label for="player_id_input">Player ID</label>
<input type="text" value="45f613c8-df18-48ae-8b85-852a0beb9ca9" id="player_id_input"  style="width: 40%;"/>
<button onclick="generate_new_player_id()">Сгенерить новый</button>
<br>
<label for="lobby_id_input">Lobby ID</label>
<input type="text" value="" id="lobby_id_input" style="width: 40%;"/>
<button onclick="generate_new_lobby_id()">Сгенерить новый</button>
<br>
<button onclick="connect_ws()" style="background: #94941b; color: white; font-weight: bold;">Connect WS</button>
<button onclick="send_end_turn()" style="background: #a66606; color: white; font-weight: bold;">END TURN</button>
<button onclick="send_move()" style="background: #057514; color: white; font-weight: bold;">MOVE</button>
<label for="weapon_select">Оружие:</label>
<select id="weapon_select" style="background: #222; color: #eee; padding: 5px;"></select>
<button onclick="send_attack()" style="background: #057514; color: white; font-weight: bold;">ATTACK</button>

<div id="actors" style="margin-top: 20px;"></div>
<div id="map"></div>
<div id="cell_info" style="margin-top: 10px; min-height: 24px; color: #ccc;"></div>

<script src="/static/utils.js"></script>


<script>
let selectedCell = null;
let lastPlayerState = null;
let availableMoves = [];
let lastGameState = null;

function select_cell(x, y, cellEl) {
    document.querySelectorAll(".cell.selected").forEach(c => c.classList.remove("selected"));
    cellEl.classList.add("selected");
    selectedCell = { x, y };

    const info = document.getElementById("cell_info");
    if (!lastGameState) { info.textContent = ""; return; }

    const players = lastGameState.players || [];
    const enemies = lastGameState.dungeon.enemies || [];
    const chests = lastGameState.dungeon.chests || [];
    const exit = lastGameState.dungeon.exit;
    let _pre_content = `[${x} ${y}]`;
    const player = players.find(p => p.position.x === x && p.position.y === y);
    if (player) { info.textContent = `${_pre_content} Игрок: ${player.name} HP ${player.stats.health} Speed ${player.stats.speed}`; return; }

    const enemy = enemies.find(e => e.position.x === x && e.position.y === y);
    if (enemy) { info.textContent = `${_pre_content} Враг: ${enemy.name} HP ${enemy.stats.health} Speed ${enemy.stats.speed}`; return; }

    const chest = chests.find(c => c.position.x === x && c.position.y === y);
    if (chest) { info.textContent = `${_pre_content} Сундук`; return; }

    if (exit && exit.x === x && exit.y === y) { info.textContent = `${_pre_content} Выход`; return; }

    const tiles = lastGameState.dungeon.map.tiles;
    info.textContent = tiles[x][y] === " # " ? `${_pre_content} Стена` : `${_pre_content} Пол`;
}

let socket;
const _input = document.getElementById("player_id_input");
_input.value = crypto.randomUUID();

function generate_new_player_id(){
    const _input = document.getElementById("player_id_input");
    _input.value = crypto.randomUUID();
}

function generate_new_lobby_id(){
    const _input = document.getElementById("lobby_id_input");
    _input.value = crypto.randomUUID();
}

async function create_lobby() {
    const _player_id_input = document.getElementById("player_id_input");
    const _input_lobby = document.getElementById("lobby_id_input");
    const _players_num = document.getElementById("input_players_num");
    try {
        const response = await fetch("http://localhost:8000/lobbies", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                players_num: _players_num.value,
                created_by_player_id: _player_id_input.value
            })
        });
        const data = await response.json();
        _input_lobby.value = data.lobby_id;
        showToast("Лобби успешно создано");
        return data.lobby_id;
    } catch (e) {
        console.error("Ошибка при создании лобби:", e);
        alert("Не удалось создать лобби");
    }
}

async function start_game() {
    const _input_lobby = document.getElementById("lobby_id_input");
    try {
        const response = await fetch("http://localhost:8000/start_game", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                lobby_id: _input_lobby.value,
            })
        });
        const response_data = await response.json();
        showToast(JSON.stringify(response_data["detail"]));

    } catch (e) {
        console.error("Ошибка при старте игры", e);
        alert("Не удалось стартовать игру");
    }
}

async function connect_to_lobby() {
    const _input_lobby = document.getElementById("lobby_id_input");
    const _player_id_input = document.getElementById("player_id_input");
    try {
        const response = await fetch("http://localhost:8000/connect_lobby", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                lobby_id: _input_lobby.value,
                player: {
                    id: _player_id_input.value,
                    team: 1,
                }
            })
        });
        const response_data = await response.json();
        showToast(JSON.stringify(response_data));
    } catch (e) {
        console.error("Ошибка при присоединении к лобби:", e);
        alert("Не удалось присоединиться к лобби");
    }
}

async function connect_ws() {
    const _input_player_id = document.getElementById("player_id_input");
    const _input_lobby_id = document.getElementById("lobby_id_input");
    const playerId = _input_player_id.value;
    let lobbyId = _input_lobby_id.value;
    if (lobbyId === ""){
        await create_lobby();
    }
    else {
        console.log("connect(): using lobby uuid from input");
    }

    socket = new WebSocket(`ws://localhost:8000/ws/${lobbyId}/${playerId}`);
    socket.onclose = (event) => {
        console.log(`Код: ${event.code}`);
        console.log(`Причина: ${event.reason}`); // "Lobby not found"
        
        if (event.reason === "Lobby not found") {
            alert("Лобби не существует!");
        }
    };

    socket.onmessage = (event) => {
        console.log("msg WS");
        const msg = JSON.parse(event.data);
            handle_ws_msg(msg);
    };
}

function handle_ws_msg(msg) {
    console.log(msg);
    if (msg.type === "lobby_state") {
        console.log("lobby msg state");
    }
    else if (msg.type === "game_event") {
        alert(msg.message);
    }
    else if (msg.type === "state_update") {
        handle_game_state(msg.payload);
    }
}

function update_weapon_selector(weapons) {
    const select = document.getElementById("weapon_select");
    const currentSelectedId = select.value;
    select.innerHTML = "";
    weapons.forEach(w => {
        const option = document.createElement("option");
        option.value = w.id;
        option.textContent = `${w.name} (Dmg: ${w.damage}, Rng: ${w.range})`;
        if (w.id === currentSelectedId) {
            option.selected = true;
        }
        select.appendChild(option);
    });
}

function handle_game_state(state){
    lastGameState = state;
    const playerId = document.getElementById("player_id_input").value;
    lastPlayerState = state.players.find(p => p.id === playerId);
    if (lastPlayerState) {
        update_weapon_selector(lastPlayerState.inventory.weapons);
    }
    const dungeon = state.dungeon;
    const tiles = dungeon.map.tiles;
    const width = dungeon.map.width;
    const height = dungeon.map.height;
    const currentActor = state.turn.current_actor;
    if (currentActor && currentActor.id === playerId){
        showToast("Ваш ход!");
    }

    availableMoves = state.turn.available_moves || [];

    const actorsContainer = document.getElementById("actors");
    actorsContainer.innerHTML = "";
    for (const e of dungeon.enemies) {
        const div = document.createElement("div");
        div.textContent = `ИИ/Враг ${e.name} — HP: ${e.stats.health} Total AP: ${e.stats.action_points} Dmg: ${e.stats.damage}`;
        div.style.color = "#AA3344";
        actorsContainer.appendChild(div);
    }
    for (const p of state.players) {
        const div = document.createElement("div");
        div.textContent = `Игрок ${p.name} — HP: ${p.stats.health} Total AP: ${p.stats.action_points} Dmg: ${p.stats.damage}`;
        div.style.color = "#33AA44";
        actorsContainer.appendChild(div);
    }
    if (state.turn.current_actor) {
        const div = document.createElement("div");
        div.textContent = `Текущий актор ${state.turn.current_actor.name} — HP: ${state.turn.current_actor.stats.health} AP: ${state.turn.current_actor.current_action_points} / ${state.turn.current_actor.stats.action_points} Dmg: ${state.turn.current_actor.stats.damage}`;
        div.style.color = "#99AAEE";
        actorsContainer.appendChild(div);
    }

    const container = document.getElementById("map");
    container.innerHTML = "";
    container.style.gridTemplateColumns = `repeat(${width}, 32px)`;

    // === создаём базовую карту (логика остается прежней) ===
    let visual = [];
    for (let x = 0; x < width; x++) {
        visual[x] = [];
        for (let y = 0; y < height; y++) {
            visual[x][y] = { base: normalize_map_value(tiles[x][y]), entity: null };
        }
    }

    // === накладываем сущности ===

    // игроки
    for (const p of state.players) {
        visual[p.position.x][p.position.y].entity = "P";
    }

    // враги
    for (const e of dungeon.enemies) {
        visual[e.position.x][e.position.y].entity = "E";
    }

    // // сундуки
    for (const c of dungeon.chests) {
        visual[c.position.x][c.position.y].entity = "C";
    }

    // // выход
    visual[dungeon.exit.x][dungeon.exit.y].entity = "X";

    for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
            const cellData = visual[x][y];
            const cell = document.createElement("div");
            cell.classList.add("cell");

            // base
            cell.classList.add(cellData.base === "#" ? "wall" : "floor");

            // entity overlay
            if (cellData.entity) {
                const entityMap = { "P": "player", "E": "enemy", "C": "chest", "X": "exit" };
                const className = entityMap[cellData.entity];
                if (className) {
                    cell.classList.add(className);
                    cell.innerText = cellData.entity;
                }
            }

            cell.addEventListener("click", () => select_cell(x, y, cell));
            if (availableMoves.some(m => m.x === x && m.y === y)) {
                cell.classList.add("available");
            }
            if (selectedCell && selectedCell.x === x && selectedCell.y === y) {
                cell.classList.add("selected");
            }
            container.appendChild(cell);
        }
    }
}

async function send_end_turn() {
    if (!socket || socket.readyState !== WebSocket.OPEN) {
        alert("WebSocket не подключен!");
        return;
    }
    if (!lastPlayerState) {
        alert("Данные игрока еще не получены от сервера (state_update) или игрок мёртв");
        return;
    }
    const action = {
        id: crypto.randomUUID(), // uuid.UUID
        actor: lastPlayerState,  // ActorState (объект из последнего state_update)
        type: "END_TURN",        // Literal
        cell: {                  // PointState
            x: lastPlayerState.position.x,
            y: lastPlayerState.position.y
        },
        params: null             // dict | None
    };
    console.log("Sending END_TURN action:", action);
    socket.send(JSON.stringify(action));
}

async function send_move() {
    if (!socket || socket.readyState !== WebSocket.OPEN) {
        alert("WebSocket не подключен!");
        return;
    }
    if (!lastPlayerState) {
        alert("Данные игрока еще не получены от сервера (state_update) или игрок мёртв");
        return;
    }
    if (!selectedCell){
        showToast("Клетка ещё не выбрана");
        return;
    }
    const action = {
        id: crypto.randomUUID(),
        actor: lastPlayerState,
        type: "MOVE",
        cell: {
            x: selectedCell.x,
            y: selectedCell.y
        },
        params: null
    };
    console.log("Sending MOVE action:", action);
    socket.send(JSON.stringify(action));
}

async function send_attack() {
    if (!socket || socket.readyState !== WebSocket.OPEN) {
        alert("WebSocket не подключен!");
        return;
    }
    if (!lastPlayerState) {
        alert("Данные игрока еще не получены от сервера (state_update) или игрок мёртв");
        return;
    }
    if (!selectedCell){
        showToast("Клетка ещё не выбрана");
        return;
    }
    const weaponSelect = document.getElementById("weapon_select");
    const selectedWeaponId = weaponSelect.value;
    if (!selectedWeaponId) {
        alert("У вас нет оружия для атаки!");
        return;
    }
    const action = {
        id: crypto.randomUUID(),
        actor: lastPlayerState,
        type: "ATTACK",
        cell: {
            x: selectedCell.x,
            y: selectedCell.y
        },
        params: {
            weapon_id: selectedWeaponId
        }
    };
    console.log("Sending ATTACK action:", action);
    socket.send(JSON.stringify(action));
}
</script>

</body>
</html>
