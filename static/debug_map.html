<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dungeon Debug Map</title>

<style>
* {
    box-sizing: border-box;
}

body {
    font-family: monospace;
    background: #111;
    color: #eee;
}

#map {
    display: grid;
    gap: 2px;
    margin-top: 20px;
    width: fit-content;
}

.cell {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
}

/* base */
.wall { background: #222; }
.floor { background: #444; }

/* entities */
.player { background: #4caf50; }
.enemy { background: #f44336; }
.chest { background: gold; color: black; }
.exit { background: #2196f3; }

/* debug */
.move { outline: 2px solid #00ffff; }

</style>
</head>

<body>

<br>
<label for="input_players_num">Кол-во игроков</label>
<input type="number" id="input_players_num" value="1" style="width: 50px">
<button onclick="create_lobby()" style="background: #4caf50; color: white;">Создать лобби (POST)</button>
<button onclick="connect_to_lobby()" style="background: #4caf50; color: white;">Присоединиться к лобби (POST)</button>
<button onclick="start_game()" style="background: #4caf50; color: white;">Старт игры (POST)</button>
<br>
<br>
<label for="player_id_input">Player ID</label>
<input type="text" value="45f613c8-df18-48ae-8b85-852a0beb9ca9" id="player_id_input"  style="width: 40%;"/>
<button onclick="generate_new_player_id()">Сгенерить новый</button>
<br>
<label for="lobby_id_input">Lobby ID</label>
<input type="text" value="" id="lobby_id_input" style="width: 40%;"/>
<button onclick="generate_new_lobby_id()">Сгенерить новый</button>
<br>
<button onclick="connect_ws()">Connect WS</button>
<div id="map"></div>

<script>
let socket;
const _input = document.getElementById("player_id_input");
_input.value = crypto.randomUUID();

function generate_new_player_id(){
    const _input = document.getElementById("player_id_input");
    _input.value = crypto.randomUUID();
}

function generate_new_lobby_id(){
    const _input = document.getElementById("lobby_id_input");
    _input.value = crypto.randomUUID();
}

async function create_lobby() {
    const _player_id_input = document.getElementById("player_id_input");
    const _input_lobby = document.getElementById("lobby_id_input");
    const _players_num = document.getElementById("input_players_num");
    try {
        const response = await fetch("http://localhost:8000/lobbies", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                players_num: _players_num.value,
                created_by_player_id: _player_id_input.value
            })
        });
        const data = await response.json();
        _input_lobby.value = data.lobby_id;
        return data.lobby_id;
    } catch (e) {
        console.error("Ошибка при создании лобби:", e);
        alert("Не удалось создать лобби");
    }
}

async function start_game() {
    const _input_lobby = document.getElementById("lobby_id_input");
    try {
        const response = await fetch("http://localhost:8000/start_game", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                lobby_id: _input_lobby.value,
            })
        });
    } catch (e) {
        console.error("Ошибка при старте игры", e);
        alert("Не удалось стартовать игру");
    }
}

async function connect_to_lobby() {
    const _input_lobby = document.getElementById("lobby_id_input");
    const _player_id_input = document.getElementById("player_id_input");
    try {
        const response = await fetch("http://localhost:8000/connect_lobby", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                lobby_id: _input_lobby.value,
                player: {
                    id: _player_id_input.value,
                    team: 1,
                }
            })
        });
    } catch (e) {
        console.error("Ошибка при присоединении к лобби:", e);
        alert("Не удалось присоединиться к лобби");
    }
}

async function connect_ws() {
    const _input_player_id = document.getElementById("player_id_input");
    const _input_lobby_id = document.getElementById("lobby_id_input");
    const playerId = _input_player_id.value;
    let lobbyId = _input_lobby_id.value;
    if (lobbyId === ""){
        await create_lobby();
    }
    else {
        console.log("connect(): using lobby uuid from input");
    }

    socket = new WebSocket(`ws://localhost:8000/ws/${lobbyId}/${playerId}`);
    socket.onclose = (event) => {
        console.log(`Код: ${event.code}`);
        console.log(`Причина: ${event.reason}`); // "Lobby not found"
        
        if (event.reason === "Lobby not found") {
            alert("Лобби не существует!");
        }
    };

    socket.onmessage = (event) => {
        console.log("msg WS");
        const msg = JSON.parse(event.data);
            handle_ws_msg(msg);
    };
}

function normalize(value) {
    if (typeof value !== "string") return "";
    return value.trim();
}

function handle_ws_msg(msg) {
    console.log(msg);
    if (msg.type === "lobby_state") {
        console.log("lobby msg state");
    }

    if (msg.type === "state_update") {
        handle_game_state(msg.payload);
    }
}

function handle_game_state(state){
    const dungeon = state.dungeon;
    const tiles = dungeon.map.tiles;
    const width = dungeon.map.width;
    const height = dungeon.map.height;

    const container = document.getElementById("map");
    container.innerHTML = "";
    container.style.gridTemplateColumns = `repeat(${width}, 32px)`;

    // === создаём базовую карту (логика остается прежней) ===
    let visual = [];
    for (let x = 0; x < width; x++) {
        visual[x] = [];
        for (let y = 0; y < height; y++) {
            visual[x][y] = { base: normalize(tiles[x][y]), entity: null };
        }
    }

    // === накладываем сущности ===

    // игроки
    for (const p of state.players) {
        visual[p.position.x][p.position.y].entity = "P";
    }

    // враги
    for (const e of dungeon.enemies) {
        visual[e.position.x][e.position.y].entity = "E";
    }

    // // сундуки
    for (const c of dungeon.chests) {
        visual[c.position.x][c.position.y].entity = "C";
    }

    // // выход
    visual[dungeon.exit.x][dungeon.exit.y].entity = "X";

    for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
            const cellData = visual[x][y];
            const cell = document.createElement("div");
            cell.classList.add("cell");

            // base
            cell.classList.add(cellData.base === "#" ? "wall" : "floor");

            // entity overlay
            if (cellData.entity) {
                const entityMap = { "P": "player", "E": "enemy", "C": "chest", "X": "exit" };
                const className = entityMap[cellData.entity];
                if (className) {
                    cell.classList.add(className);
                    cell.innerText = cellData.entity;
                }
            }

            container.appendChild(cell);
        }
    }
}


function inBounds(pos, w, h) {
    return pos.x >= 0 && pos.y >= 0 && pos.x < w && pos.y < h;
}

</script>

</body>
</html>
